name: publish-client-es

on:
    release:
        types: [published]
    workflow_dispatch:
        inputs:
            version:
                description: "公開するバージョン（vX.Y.Z または vX.Y.Z-suffix）"
                required: false
                type: string

permissions:
    contents: read
    packages: write

jobs:
    publish:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

            - name: Set up buf
              uses: bufbuild/buf-action@fd21066df7214747548607aaa45548ba2b9bc1ff # v1.4.0
              with:
                  setup_only: true
                  github_token: ${{ secrets.GITHUB_TOKEN }}

            - name: Set up Task
              uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa # v2.1.0
              with:
                  version: 3.x
                  repo-token: ${{ secrets.GITHUB_TOKEN }}

            - name: Lint proto
              run: task proto:lint

            - name: Generate connect-es client
              run: task proto:gen:client

            - name: Set up Node.js
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: 24
                  registry-url: https://npm.pkg.github.com
                  scope: "@pj-hoakari"

            - name: Resolve and apply version
              id: version
              working-directory: clients/connect-es
              env:
                  INPUT_VERSION: ${{ inputs.version }}
              run: |
                  set -euo pipefail
                  RAW="$INPUT_VERSION"
                  if [ -z "$RAW" ] && [ "$GITHUB_EVENT_NAME" = "release" ]; then
                    RAW="$GITHUB_REF_NAME"
                  fi

                  if [ -n "$RAW" ]; then
                    # 先頭の v を許容して除去し、vX.Y.Z(-suffix) 形式を検証する。
                    VERSION="${RAW#v}"
                    if ! printf '%s' "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'; then
                      echo "::error::想定外のタグ/バージョン形式です: '$RAW'（vX.Y.Z または vX.Y.Z-suffix。例: v0.1.0, v0.1.0-rc）"
                      exit 1
                    fi
                    npm version "$VERSION" --no-git-tag-version --allow-same-version
                  else
                    VERSION="$(node -p "require('./package.json').version")"
                  fi

                  DIST_TAG="latest"
                  case "$VERSION" in
                    *-*) DIST_TAG="next" ;;
                  esac

                  echo "dist_tag=$DIST_TAG" >> "$GITHUB_OUTPUT"
                  echo "publishing $(node -p "require('./package.json').name")@${VERSION} (dist-tag: ${DIST_TAG})"

            - name: Publish to GitHub Packages
              working-directory: clients/connect-es
              run: npm publish --tag "${{ steps.version.outputs.dist_tag }}"
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
